name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x gradlew || true
      - name: Build APK
        run: |
          if [ ! -f gradlew ]; then
            echo "#!/bin/sh\nDIR=\$(cd \"\$(dirname \"\$0\")\"; pwd)\nexec \"\$JAVA_HOME/bin/java\" -jar \"\$DIR/gradle/wrapper/gradle-wrapper.jar\" \"\$@\"" > gradlew
            chmod +x gradlew
          fi
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VypervicAgent
          path: app/build/outputs/apk/release/*.apk
